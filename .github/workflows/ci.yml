name: PRO ANALYST CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
        continue-on-error: true

  deploy-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify app imports correctly
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from data_fetchers.fetcher import DataFetcher, POPULAR_EXCHANGES
          from ai_engine.analyst import AIAnalyst
          from utils.benchmarks import get_benchmarks, SECTORS
          from utils.charts import area_trend, bar_chart, line_chart
          print('✅ All imports successful')
          print(f'   Exchanges: {len(POPULAR_EXCHANGES)}')
          print(f'   Sectors: {len(SECTORS)}')
          "

      - name: Check Streamlit config
        run: |
          python -c "
          import os
          assert os.path.exists('.streamlit/config.toml'), 'Missing .streamlit/config.toml'
          print('✅ Streamlit config OK')
          "

      - name: Deployment ready notification
        run: |
          echo "✅ All checks passed. Streamlit Cloud will auto-deploy from main branch."
          echo "📊 PRO ANALYST Dashboard is ready for deployment."
